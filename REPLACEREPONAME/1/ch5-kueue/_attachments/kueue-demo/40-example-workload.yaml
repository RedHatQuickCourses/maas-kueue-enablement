apiVersion: kueue.x-k8s.io/v1beta2
kind: Workload
metadata:
  name: example-workload
  namespace: team-a-project
spec:
  queueName: team-a-queue
  podSets:
    - name: default
      replicas: 1
      template:
        spec:
          priorityClassName: team-a-low
          containers:
            - name: busybox
              image: registry.access.redhat.com/ubi8/ubi
              command: ["sleep", "3600"]
              resources:
                requests:
                  cpu: "500m"
                  memory: "256Mi"
