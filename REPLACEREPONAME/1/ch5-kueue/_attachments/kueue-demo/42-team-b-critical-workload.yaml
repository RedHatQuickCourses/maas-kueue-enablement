apiVersion: kueue.x-k8s.io/v1beta2
kind: Workload
metadata:
  name: team-b-critical
  namespace: team-b-project
spec:
  queueName: team-b-queue
  podSets:
    - name: default
      replicas: 1
      template:
        spec:
          priorityClassName: team-b-high
          containers:
            - name: critical
              image: registry.access.redhat.com/ubi8/ubi
              command: ["sleep", "3600"]
              resources:
                requests:
                  cpu: "4"
                  memory: "4Gi"
